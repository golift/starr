version: '2'
linters:
  default: all
  disable:
    - dupl
    - exhaustruct
    - musttag
    - nlreturn
    - tagliatelle
    - noinlineerr
    - wsl
  settings:
    gosec:
      excludes:
        - G117
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    depguard:
      rules:
        main:
          files:
            - $all
          allow:
            - $gostd
            - github.com/stretchr/testify
            - golift.io/starr
            - golang.org/x/net
  exclusions:
    generated: lax
    presets:
      - std-error-handling
    rules:
      - linters:
          - nonamedreturns
        path: starrcmd/
      - linters:
          - forcetypeassert
          - funlen
          - gochecknoglobals
          - lll
          - maintidx
        path: (.+)_test\.go
      - linters:
          - exhaustive
          - cyclop
        path: starrconnect/(.+)_handler\.go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
